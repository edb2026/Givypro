.back-to-givy {
  position: fixed;
  top: 16px;
  left: 16px;
  background: linear-gradient(135deg, #059669 0%, #047857 100%);
  color: white;
  padding: 10px 16px;
  border-radius: 999px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 4px 14px rgba(5,150,105,0.4);
  z-index: 100;
  transition: transform 0.15s, box-shadow 0.15s;
}
.back-to-givy:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(5,150,105,0.5); }
.back-to-givy:active { transform: scale(0.97); }
@media (max-width: 480px) {
  .back-to-givy { padding: 8px 12px; font-size: 12px; }
}

.filters { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
.filter-btn { background: #1A1A1A; border: 1px solid #333; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; }
.filter-btn.active { background: #C5A267; color: black; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
.product-card { background: #121212; border-radius: 16px; padding: 15px; transition: transform 0.2s; }
.product-card:hover { transform: translateY(-5px); }
.product-img { background: #1E1E1E; height: 250px; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; position: relative; cursor: pointer; }
.product-img img { width: 100%; height: 100%; object-fit: cover; }
.img-placeholder { font-size: 60px; }
.image-counter { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 20px; font-size: 11px; }
.sold-badge { position: absolute; bottom: 10px; left: 10px; background: #E41E3F; color: white; font-weight: bold; font-size: 13px; padding: 5px 12px; border-radius: 6px; letter-spacing: 1px; box-shadow: 0 2px 6px rgba(0,0,0,0.4); text-transform: uppercase; }
.sold-card .product-img img { filter: grayscale(35%) brightness(0.85); }
.brand { color: #C5A267; font-size: 12px; }
.title { font-size: 18px; font-weight: bold; margin: 8px 0; }

.price { color: #C5A267; font-size: 20px; font-weight: bold; }
.action-btns { display: flex; gap: 8px; margin-top: 15px; }
.fb-btn { background: #1877F2; border: none; padding: 10px; border-radius: 30px; color: white; font-weight: bold; flex: 1; cursor: pointer; font-size: 13px; }
.mp-btn { background: #2a7f4f; border: none; padding: 10px; border-radius: 30px; color: white; font-weight: bold; flex: 1; cursor: pointer; font-size: 13px; }
.admin-icon { position: fixed; bottom: 20px; left: 20px; width: 40px; height: 40px; background: #C5A267; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0.3; cursor: pointer; z-index: 999; }
.empty { text-align: center; padding: 50px; color: #666; }
.lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.2s; }
.lightbox.active { visibility: visible; opacity: 1; }
.lightbox img { max-width: 90%; max-height: 85%; object-fit: contain; user-select: none; }
.lightbox-close { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: white; user-select: none; }
.lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: white; font-size: 30px; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; user-select: none; }
.lightbox-nav:hover { background: rgba(255,255,255,0.2); }
.lightbox-prev { left: 20px; }
.lightbox-next { right: 20px; }
.lightbox-counter { position: absolute; top: 20px; left: 30px; color: white; font-size: 16px; background: rgba(0,0,0,0.5); padding: 6px 14px; border-radius: 20px; }
.lightbox-thumbs { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; max-width: 90%; overflow-x: auto; padding: 6px; }

<body>
  <a href="index.html" class="back-to-givy" title="Back to Givy Rewards">&#8592; Givy Rewards</a>

  <h1><span class="logo-float">&#128715;&#65039;</span> GivyRewards<span class="shop-accent">Shop</span></h1>
  <div id="filters" class="filters"></div>
  <div id="products" class="product-grid"><div class="empty">Loading...</div></div>
  <div class="admin-icon" id="adminIcon">&#128081;</div>

  <div id="lightbox" class="lightbox">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <div class="lightbox-counter" id="lbCounter"></div>
    <button class="lightbox-nav lightbox-prev" onclick="navLightbox(event, -1)">&lsaquo;</button>
    <img id="lightboxImg" src="" alt="">
    <button class="lightbox-nav lightbox-next" onclick="navLightbox(event, 1)">&rsaquo;</button>
    <div class="lightbox-thumbs" id="lbThumbs"></div>
  </div>

  <script>
    const DB_NAME = 'GivyRewardsDB';
    const DB_VERSION = 1;
    const STORE_PRODUCTS = 'products';
    const STORE_SETTINGS = 'settings';

    let products = [];
    let categories = ['furniture', 'seating', 'beds', 'rugs', 'decor', 'office'];
    let activeFilter = 'all';
    let globalFb = '';
    let clickCount = 0;
    let lbImages = [];
    let lbIndex = 0;
    let db = null;

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
          const database = e.target.result;
          if (!database.objectStoreNames.contains(STORE_PRODUCTS)) {
            database.createObjectStore(STORE_PRODUCTS, { keyPath: 'id' });
          }
          if (!database.objectStoreNames.contains(STORE_SETTINGS)) {
            database.createObjectStore(STORE_SETTINGS, { keyPath: 'key' });
          }
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(db); };
        req.onerror = (e) => reject(e.target.error);
      });
    }

    function idbGetAll(storeName) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    }

    function idbGet(storeName, key) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function loadData() {
      try {
        if (!db) await openDB();
        products = await idbGetAll(STORE_PRODUCTS);
        products.sort((a, b) => (a.id || 0) - (b.id || 0));

        const catsRow = await idbGet(STORE_SETTINGS, 'categories');
        if (catsRow && catsRow.value) categories = catsRow.value;

        const fbRow = await idbGet(STORE_SETTINGS, 'globalFb');
        globalFb = (fbRow && fbRow.value) || '';
      } catch(err) {
        console.error('Load error:', err);
        const savedProducts = localStorage.getItem('givy_products');
        products = savedProducts ? JSON.parse(savedProducts) : [];
        const savedCats = localStorage.getItem('givy_categories');
        if (savedCats) categories = JSON.parse(savedCats);
        globalFb = localStorage.getItem('givy_global_fb') || '';
      }
      renderFilters();
      renderProducts();
    }

    function renderFilters() {
      const container = document.getElementById('filters');
      container.innerHTML = '';
      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn' + (activeFilter === 'all' ? ' active' : '');
      allBtn.textContent = 'All';
      allBtn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        allBtn.classList.add('active');
        activeFilter = 'all';
        renderProducts();
      };
      container.appendChild(allBtn);

      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (activeFilter === cat ? ' active' : '');
        btn.textContent = cat;
        btn.onclick = () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = cat;
          renderProducts();
        };
        container.appendChild(btn);
      });

      const soldBtn = document.createElement('button');
      soldBtn.className = 'filter-btn' + (activeFilter === '__sold' ? ' active' : '');
      soldBtn.textContent = '\uD83C\uDFF7\uFE0F Sold';
      soldBtn.style.borderColor = '#E41E3F';
      soldBtn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        soldBtn.classList.add('active');
        activeFilter = '__sold';
        renderProducts();
      };
      container.appendChild(soldBtn);
    }

    function openLightbox(images, index) {
      if (!images || images.length === 0) return;
      lbImages = images;
      lbIndex = index || 0;
      updateLightbox();
      document.getElementById('lightbox').classList.add('active');
    }

    function updateLightbox() {
      document.getElementById('lightboxImg').src = lbImages[lbIndex];
      document.getElementById('lbCounter').textContent = (lbIndex + 1) + ' / ' + lbImages.length;
      const showNav = lbImages.length > 1;
      document.querySelector('.lightbox-prev').style.display = showNav ? 'block' : 'none';
      document.querySelector('.lightbox-next').style.display = showNav ? 'block' : 'none';
      const thumbs = document.getElementById('lbThumbs');
      if (lbImages.length > 1) {
        thumbs.style.display = 'flex';
        thumbs.innerHTML = lbImages.map((src, i) =>
          '<div class="lightbox-thumb ' + (i === lbIndex ? 'active' : '') + '" onclick="jumpLightbox(event, ' + i + ')"><img src="' + src + '"></div>'
        ).join('');
      } else {
        thumbs.style.display = 'none';
      }
    }

    function navLightbox(e, dir) {
      if (e) e.stopPropagation();
      lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
      updateLightbox();
    }

    function jumpLightbox(e, i) {
      if (e) e.stopPropagation();
      lbIndex = i;
      updateLightbox();
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft' && lbImages.length > 1) { lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; updateLightbox(); }
      else if (e.key === 'ArrowRight' && lbImages.length > 1) { lbIndex = (lbIndex + 1) % lbImages.length; updateLightbox(); }
    });

    function openMessenger(product) {
      const user = (product.fbUser || globalFb || '').replace(/^@/, '').trim();
      const msg = 'Hello! I\'m interested in "' + product.name + '" (' + (product.brand || 'GIVY STUDIO') + ') - $' + product.price + '. Is it still available?';
      const encoded = encodeURIComponent(msg);

      if (!user) {
        alert('No Facebook username set yet.\n\nContact the seller about: ' + product.name + '\n\n(Admin can add a username in the admin panel.)');
        return;
      }
      const url = 'https://m.me/' + user + '?text=' + encoded;
      window.open(url, '_blank');
    }

    function openMarketplace(product) {
      const query = encodeURIComponent((product.name + ' ' + (product.brand || '')).trim());
      const url = 'https://www.facebook.com/marketplace/search/?query=' + query;
      window.open(url, '_blank');
    }

    function renderProducts() {
      const container = document.getElementById('products');
      let filtered;
      if (activeFilter === '__sold') {
        filtered = products.filter(p => p.sold);
      } else if (activeFilter === 'all') {
        filtered = products.filter(p => !p.sold);
      } else {
        filtered = products.filter(p => !p.sold && p.category === activeFilter);
      }

      if(filtered.length === 0) {
        const msg = activeFilter === '__sold' ? '\uD83D\uDCED No sold products yet' : '\u2728 No products';
        container.innerHTML = '<div class="empty">' + msg + '</div>';
        return;
      }

      container.innerHTML = '';
      filtered.forEach((p) => {
        const images = p.images && p.images.length ? p.images : [];
        const firstImage = images.length > 0 ? images[0] : null;
        const imageCount = images.length;
        const isSold = !!p.sold;

        const card = document.createElement('div');
        card.className = 'product-card' + (isSold ? ' sold-card' : '');
        card.innerHTML =
          '<div class="product-img">' +
            (firstImage ? '<img src="' + firstImage + '" alt="' + escapeHtml(p.name) + '">' : '<div class="img-placeholder">\uD83E\uDE91</div>') +
            (imageCount > 1 ? '<div class="image-counter">\uD83D\uDCF7 ' + imageCount + '</div>' : '') +
            (isSold ? '<div class="sold-badge">Sold</div>' : '') +
          '</div>' +
          '<div class="brand">' + escapeHtml(p.brand || 'GIVY STUDIO') + '</div>' +
          '<div class="title">' + escapeHtml(p.name) + '</div>' +
          '<div class="desc">' + escapeHtml(p.desc || 'Luxury piece') + '</div>' +
          '<div class="price">$' + p.price + '</div>' +
          '<div class="action-btns">' +
            '<button class="fb-btn" title="Message seller on Messenger"' + (isSold ? ' disabled style="opacity:0.5; cursor:not-allowed;"' : '') + '>\uD83D\uDCAC Interested</button>' +
            '<button class="mp-btn" title="Find on Facebook Marketplace">\uD83D\uDED2 Marketplace</button>' +
          '</div>';
        const imgDiv = card.querySelector('.product-img');
        imgDiv.onclick = () => openLightbox(images, 0);
        if (!isSold) card.querySelector('.fb-btn').onclick = () => openMessenger(p);
        card.querySelector('.mp-btn').onclick = () => openMarketplace(p);
        container.appendChild(card);
      });
    }

    document.getElementById('adminIcon').onclick = () => {
      clickCount++;
      setTimeout(() => clickCount = 0, 500);
      if(clickCount >= 3) location.href = 'shop-admin.html';
    };

    try {
      const bc = new BroadcastChannel('givy_sync');
      bc.onmessage = (e) => { if (e.data && e.data.type === 'update') loadData(); };
    } catch(e) {}

    window.addEventListener('storage', (e) => {
      if (e.key === 'givy_updated') loadData();
    });

    function escapeHtml(str) { return str ? String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ''; }

    loadData();
  </script>
